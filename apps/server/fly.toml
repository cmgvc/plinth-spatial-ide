app = "plinth"
primary_region = "yyz"

[mounts]
  source = "plinth_data"
  destination = "/home/sandbox/workspace"
  initial_size = "1gb"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 20
    soft_limit = 15

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"

  [services.http_checks]
    interval = "10s"
    timeout = "2s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024